<h2 class="ml-page-title">Veterinarians</h2>
<div class="ml-card">
<div class="ml-toolbar">
    <div class="ml-muted small">Manage veterinarians and specialties.</div>
    <p ng-if="!$ctrl.restrictVetManagement" style="margin: 0;">
        <a class="btn btn-primary btn-sm" ui-sref="vetNew">
            <span class="fa fa-plus"></span>
            Add veterinarian
        </a>
    </p>
</div>
<div class="ml-subtle-table table-responsive">
<table class="table table-striped">
    <thead>
    <tr>
        <th>Name</th>
        <th>Specialties</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tr ng-repeat="vet in $ctrl.vetList">
        <td>{{vet.firstName}} {{vet.lastName}}</td>
        <td><span ng-repeat="specialty in vet.specialties">{{specialty.name + ' '}}</span></td>
        <td>
            <div class="ml-actions">
                <a class="btn btn-outline-primary btn-sm" ui-sref="vetEdit({vetId: vet.id})">Edit</a>
                <button ng-if="!$ctrl.restrictVetManagement" type="button" class="btn btn-danger btn-sm" ng-click="$ctrl.deleteVet($event, vet.id)">Delete</button>
            </div>
        </td>

    </tr>
</table>
</div>
</div>
