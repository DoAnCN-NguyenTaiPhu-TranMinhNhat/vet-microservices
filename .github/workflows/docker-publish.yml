name: Build & Push Docker (vet-microservices)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  GHCR_PACKAGE_PREFIX: ghcr.io/doancn-nguyentaiphu-tranminhnhat/vet-ai-spring

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Podman
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login GHCR with PAT
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | podman login ghcr.io \
            -u doancn-nguyentaiphu-tranminhnhat \
            --password-stdin

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build images with Maven
        run: |
          mvn clean install \
            -PbuildDocker \
            -Dcontainer.executable=podman \
            -Ddocker.image.prefix=${{ env.GHCR_PACKAGE_PREFIX }}

      # Push images
      - name: Push images
        run: |
          SERVICES=(
            spring-petclinic-config-server
            spring-petclinic-discovery-server
            spring-petclinic-admin-server
            spring-petclinic-api-gateway
            spring-petclinic-customers-service
            spring-petclinic-vets-service
            spring-petclinic-visits-service
            spring-petclinic-genai-service
          )

          PREFIX=${{ env.GHCR_PACKAGE_PREFIX }}

          for s in "${SERVICES[@]}"; do
            echo "🚀 Pushing $s"
            podman push ${PREFIX}/${s}:latest
          done