# CI — test Maven + (push main) build & push Docker lên GHCR
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # Tên package dưới ghcr.io — GITHUB_TOKEN chỉ được ghi nếu namespace = owner của repo (chữ thường).
  # Nếu cần push sang org/package khác, tạo PAT (write:packages) và dùng secrets.GHCR_PUSH_TOKEN (xem bước login bên dưới).
  GHCR_PACKAGE_SUFFIX: vet-ai-spring

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Run unit tests
        run: mvn -B -ntp test

  # Giống: mvn clean install -PbuildDocker ... + docker push từng service (chỉ main hoặc chạy tay)
  build-and-push-docker:
    needs: test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve GHCR image prefix (owner lowercase = repo owner)
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          PREFIX="ghcr.io/${OWNER_LC}/${{ env.GHCR_PACKAGE_SUFFIX }}"
          echo "GHCR_IMAGE_PREFIX=${PREFIX}" >> "$GITHUB_ENV"
          echo "Using GHCR_IMAGE_PREFIX=${PREFIX}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      # Giảm lỗi pull anonymous từ Docker Hub (eclipse-temurin) trên runner dùng chung IP
      - name: Pull base image (Dockerfile FROM)
        run: docker pull docker.io/eclipse-temurin:17

      - name: Build JARs + Docker images (Maven buildDocker)
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          # --load trên một số runner gây lỗi với docker build; single-platform amd64 không cần --load
          mvn -B -ntp -e clean install -PbuildDocker -DskipTests \
            -Ddocker.image.prefix="${{ env.GHCR_IMAGE_PREFIX }}" \
            -Dcontainer.executable=docker \
            -Dcontainer.build.extraarg=--progress=plain

      - name: Tag and push all microservice images
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SERVICES=(
            spring-petclinic-config-server
            spring-petclinic-discovery-server
            spring-petclinic-admin-server
            spring-petclinic-api-gateway
            spring-petclinic-customers-service
            spring-petclinic-vets-service
            spring-petclinic-visits-service
            spring-petclinic-genai-service
          )
          PREFIX="${{ env.GHCR_IMAGE_PREFIX }}"
          SHA_TAG="${SHORT_SHA:0:12}"
          for s in "${SERVICES[@]}"; do
            echo "=== Pushing ${s} ==="
            docker tag "${PREFIX}/${s}:latest" "${PREFIX}/${s}:${SHA_TAG}"
            docker push "${PREFIX}/${s}:latest"
            docker push "${PREFIX}/${s}:${SHA_TAG}"
          done
