<h2>Veterinarians</h2>
<p>
    <a class="btn btn-primary" ui-sref="vetNew">
        <span class="fa fa-plus"></span>
        Add veterinarian
    </a>
</p>
<table class="table table-striped">
    <thead>
    <tr>
        <th>Name</th>
        <th>Specialties</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tr ng-repeat="vet in $ctrl.vetList">
        <td>{{vet.firstName}} {{vet.lastName}}</td>
        <td><span ng-repeat="specialty in vet.specialties">{{specialty.name + ' '}}</span></td>
        <td>
            <a ui-sref="vetEdit({vetId: vet.id})">Edit</a>
            |
            <button type="button" class="btn btn-danger btn-sm" ng-click="$ctrl.deleteVet($event, vet.id)">Delete</button>
        </td>

    </tr>
</table>
