groups:
  - name: mlair-runtime
    rules:
      - alert: MlAirSchedulerRunRequeueSpike
        expr: increase(mlair_scheduler_run_requeued_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Scheduler requeue spike detected"
          description: "Scheduler requeued more than 10 runs in 5 minutes."

      - alert: MlAirTaskFailuresDetected
        expr: increase(mlair_scheduler_task_completed_total{status="FAILED"}[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Task failures detected"
          description: "At least one FAILED task was observed in the last 10 minutes."

      - alert: MlAirExecutorStuckInflight
        expr: max_over_time(mlair_executor_queue_inflight[5m]) > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Executor inflight tasks appear stuck"
          description: "Executor inflight queue has remained above zero for 10+ minutes."

      - alert: MlAirManifestVerifyFailures
        expr: increase(mlair_scheduler_manifest_verify_failure_total[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Manifest verification failures detected"
          description: "Replay gating/manifest verification recorded failures in the last 10 minutes."

      - alert: MlAirManifestPostFailures
        expr: increase(mlair_executor_manifest_post_total{result=~"sign_failed|post_failed"}[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Manifest sign/post failures detected"
          description: "Executor failed to sign or post task manifests in the last 10 minutes."

      - alert: MlAirTriggerPolicyApiErrors
        expr: increase(mlair_scheduler_trigger_policy_skipped_total{reason=~"api_error|not_ready_or_api_error"}[10m]) > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Trigger policy API errors detected"
          description: "Scheduler skipped trigger policies multiple times due to API/check-readiness failures."

      - alert: MlAirTriggerPolicyNoFiresDespiteEvaluation
        expr: increase(mlair_scheduler_trigger_policy_evaluated_total[30m]) > 20 and increase(mlair_scheduler_trigger_policy_triggered_total[30m]) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Trigger policies evaluated but no runs fired"
          description: "Scheduler evaluated many trigger policies but did not create any auto-triggered runs in 30 minutes."

      - alert: MlAirDatasetMaterializationFailureBurst
        expr: increase(mlair_dataset_materialization_failure_total[10m]) > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Dataset materialization failure burst"
          description: "Dataset materialization failures exceeded 3 in the last 10 minutes (check strategy/threshold/config)."

      - alert: MlAirDatasetMaterializationNoVersionsCreated
        expr: increase(mlair_dataset_materialization_attempt_total[20m]) > 10 and increase(mlair_dataset_materialization_version_created_total[20m]) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Materialization attempts but no versions created"
          description: "Many materialization attempts occurred but no versions were created (could be threshold guards, strategy_not_auto, or empty buffers)."

      - alert: MlAirDatasetBufferNotResetAfterMaterialize
        expr: increase(mlair_dataset_materialization_version_created_total[15m]) > 0 and max_over_time(mlair_dataset_accumulation_current_size[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Buffer not reset after materialization (heuristic)"
          description: "A materialization created versions recently but accumulation current_size gauge stayed >0. This is heuristic (cardinality-safe gauge); inspect logs for dataset_materialized/trace_id."

      - alert: MlAirDatasetMaterializationUniqueViolation
        expr: increase(mlair_dataset_materialization_unique_violation_total[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "dataset_versions unique constraint hit during materialization"
          description: "Insert collided on idempotency_key or (dataset_id, version); API retries / resolves races. Investigate if this fires frequently (metric label constraint)."

  - name: mlair-lifecycle-semantic
    rules:
      - alert: MlAirLifecycleEligibilityDeniedBurst
        expr: sum(increase(mlair_eligibility_denied_total[15m])) > 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate of persisted not-ready readiness evaluations"
          description: "More than 15 new mlair_eligibility_denied_total increments in 15 minutes (POST .../readiness/evaluate inserts when ready=false). Tune threshold or investigate policy / data drift."

      - alert: MlAirLifecycleReadinessGateBlockedBurst
        expr: sum(increase(mlair_readiness_blocked_total[15m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Many runs blocked at the execution readiness gate"
          description: "More than 10 mlair_readiness_blocked_total increments in 15 minutes (runs_trigger / pipeline_run paths). Inspect gate inputs and dataset versions."

      - alert: MlAirLifecycleTrainIntentBlockedBurst
        expr: sum(increase(mlair_lifecycle_training_triggered_total{blocked_by_gate="true"}[15m])) > 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Many Hub train intents blocked before run creation"
          description: "More than 15 training.triggered emits with blocked_by_gate=true in 15 minutes. Check eligibility, readiness, and strict dataset_version pins."

      - alert: MlAirLifecycleModelApprovalRejectedBurst
        expr: sum(increase(mlair_lifecycle_model_version_approval_set_total{approval_status="rejected"}[15m])) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Burst of model version rejections"
          description: "More than 3 approval_status=rejected updates in 15 minutes. Review governance workflow and model artifacts."

  - name: mlair-lifecycle-semantic-tenant
    rules:
      - alert: MlAirLifecycleEligibilityDeniedBurstByTenant
        expr: sum by (tenant_id) (increase(mlair_eligibility_denied_total[15m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Tenant {{ $labels.tenant_id }}: eligibility denied burst"
          description: "More than 10 persisted not-ready readiness evaluations for tenant {{ $labels.tenant_id }} in 15 minutes. Route to tenant owner; tune policy or investigate data drift."

      - alert: MlAirLifecycleReadinessGateBlockedBurstByTenant
        expr: sum by (tenant_id) (increase(mlair_readiness_blocked_total[15m])) > 8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Tenant {{ $labels.tenant_id }}: execution readiness gate blocks"
          description: "More than 8 mlair_readiness_blocked_total increments for tenant {{ $labels.tenant_id }} in 15 minutes (runs_trigger / pipeline_run)."

      - alert: MlAirLifecycleTrainIntentBlockedBurstByTenant
        expr: sum by (tenant_id) (increase(mlair_lifecycle_training_triggered_total{blocked_by_gate="true"}[15m])) > 12
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Tenant {{ $labels.tenant_id }}: Hub train intents blocked"
          description: "More than 12 training.triggered events with blocked_by_gate=true for tenant {{ $labels.tenant_id }} in 15 minutes."
