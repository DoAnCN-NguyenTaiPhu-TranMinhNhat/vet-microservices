name: Build & Push Docker (vet-microservices)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  GHCR_PACKAGE_PREFIX: ghcr.io/doancn-nguyentaiphu-tranminhnhat/vet-ai-spring

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login GHCR with PAT
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | podman login ghcr.io \
            -u doancn-nguyentaiphu-tranminhnhat \
            --password-stdin

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build images with Maven
        run: |
          mvn clean install \
            -PbuildDocker \
            -Dcontainer.executable=podman \
            -Ddocker.image.prefix=${{ env.GHCR_PACKAGE_PREFIX }}

      - name: Push images (sequential + retry + delay)
        run: |
          set -euo pipefail

          push_with_retry() {
            local img="$1"
            local max_attempts=7
            local wait=30
            local attempt=1

            while [ "$attempt" -le "$max_attempts" ]; do
              if podman push "$img"; then
                echo "Push success: $img"
                return 0
              fi

              echo "Push failed attempt $attempt/$max_attempts: $img"

              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "Push failed permanently: $img"
                return 1
              fi

              sleep "$wait"
              attempt=$((attempt + 1))
              wait=$((wait + 20))
            done
          }

          SERVICES=(
            spring-petclinic-config-server
            spring-petclinic-discovery-server
            spring-petclinic-admin-server
            spring-petclinic-api-gateway
            spring-petclinic-customers-service
            spring-petclinic-vets-service
            spring-petclinic-visits-service
            spring-petclinic-genai-service
          )

          PREFIX="${{ env.GHCR_PACKAGE_PREFIX }}"

          for s in "${SERVICES[@]}"; do
            echo "Pushing $s"
            push_with_retry "${PREFIX}/${s}:latest"
            sleep 10
          done