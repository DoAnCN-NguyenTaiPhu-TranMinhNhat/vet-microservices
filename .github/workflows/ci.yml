# CI — test Maven + (push main) build & push Docker lên GHCR
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE_PREFIX: ghcr.io/doancn-nguyentaiphu-tranminhnhat/vet-ai-spring

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Run unit tests
        run: mvn -B -ntp test

  # Giống: mvn clean install -PbuildDocker ... + docker push từng service (chỉ main hoặc chạy tay)
  build-and-push-docker:
    needs: test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build JARs + Docker images (Maven buildDocker)
        run: |
          mvn -B -ntp clean install -PbuildDocker -DskipTests \
            -Ddocker.image.prefix="${{ env.GHCR_IMAGE_PREFIX }}" \
            -Dcontainer.executable=docker \
            -Dcontainer.build.extraarg=--load

      - name: Tag and push all microservice images
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SERVICES=(
            spring-petclinic-config-server
            spring-petclinic-discovery-server
            spring-petclinic-admin-server
            spring-petclinic-api-gateway
            spring-petclinic-customers-service
            spring-petclinic-vets-service
            spring-petclinic-visits-service
            spring-petclinic-genai-service
          )
          PREFIX="${{ env.GHCR_IMAGE_PREFIX }}"
          SHA_TAG="${SHORT_SHA:0:12}"
          for s in "${SERVICES[@]}"; do
            echo "=== Pushing ${s} ==="
            docker tag "${PREFIX}/${s}:latest" "${PREFIX}/${s}:${SHA_TAG}"
            docker push "${PREFIX}/${s}:latest"
            docker push "${PREFIX}/${s}:${SHA_TAG}"
          done
