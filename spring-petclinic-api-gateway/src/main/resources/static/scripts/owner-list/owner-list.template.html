<h2 class="ml-page-title">Owners</h2>

<div class="ml-card">
    <div class="ml-toolbar">
        <form onsubmit="javascript:void(0)">
            <input type="text" class="form-control" placeholder="Search owners" ng-model="$ctrl.query" />
        </form>
        <a class="btn btn-primary btn-sm" ui-sref="ownerNew">
            <span class="fa fa-plus"></span>
            Add owner
        </a>
    </div>

    <div class="ml-subtle-table table-responsive">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>Name</th>
                <th class="hidden-sm hidden-xs">Address</th>
                <th>City</th>
                <th>Telephone</th>
                <th class="hidden-xs">Pets</th>
            </tr>
            </thead>

            <tr ng-repeat="owner in $ctrl.owners | filter:$ctrl.query track by owner.id">
                <td>
                    <a ui-sref="ownerDetails({ ownerId: owner.id })">
                        {{owner.firstName}} {{owner.lastName}}
                    </a>
                </td>
                <td class="hidden-sm hidden-xs">{{owner.address}}</td>
                <td>{{owner.city}}</td>
                <td>{{owner.telephone}}</td>
                <td class="hidden-xs"><span ng-repeat="pet in owner.pets track by pet.id">{{pet.name + ' '}}</span></td>
            </tr>
        </table>
    </div>
</div>
