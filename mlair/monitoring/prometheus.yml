# MLAir metrics for vet-microservices Compose (petclinic-net service names).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/mlair-alerts.yml

scrape_configs:
  - job_name: mlair-api
    metrics_path: /metrics
    static_configs:
      - targets: ["mlair-api:8080"]

  - job_name: mlair-executor
    metrics_path: /metrics
    static_configs:
      - targets: ["mlair-executor:9103"]

  # Scheduler exposes :9102 when ML_AIR_SCHEDULER_METRICS_PORT is set in the image.
  - job_name: mlair-scheduler
    metrics_path: /metrics
    static_configs:
      - targets: ["mlair-scheduler:9102"]
