# Shared stack: same profile as EKS (Ansible) — vet-microservices-config on-profile: deploy
x-spring-docker-env: &spring_docker_env
  SPRING_PROFILES_ACTIVE: deploy
  # All Spring containers must talk to config-server via service DNS (not localhost).
  # Without this, services fall back to http://localhost:8888 inside the container and boot with wrong defaults.
  CONFIG_SERVER_URL: http://config-server:8888/
  # Empty JWT_SECRET in a host .env breaks JwtTokenService (needs ≥32 bytes) → container exits 1.
  JWT_SECRET: ${JWT_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=72.0

# Compose has no MySQL for core services: customers-service needs explicit JDBC + sql init.
x-spring-customers-env: &spring_customers_env
  SPRING_PROFILES_ACTIVE: deploy
  CONFIG_SERVER_URL: http://config-server:8888/
  JWT_SECRET: ${JWT_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=72.0
  SPRING_DATASOURCE_URL: jdbc:hsqldb:mem:petclinic;DB_CLOSE_DELAY=-1
  SPRING_DATASOURCE_USERNAME: sa
  SPRING_DATASOURCE_PASSWORD: ""
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.hsqldb.jdbc.JDBCDriver
  SPRING_SQL_INIT_MODE: always

networks:
  petclinic-net:
    driver: bridge

services:

  ## ========================
  ## Spring Cloud Core
  ## ========================

  config-server:
    image: springcommunity/spring-petclinic-config-server
    container_name: config-server
    networks: [petclinic-net]
    ports:
      - "8888:8888"
    environment:
      <<: *spring_docker_env
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  discovery-server:
    image: springcommunity/spring-petclinic-discovery-server
    container_name: discovery-server
    networks: [petclinic-net]
    ports:
      - "8761:8761"
    environment:
      <<: *spring_docker_env
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  customers-service:
    image: springcommunity/spring-petclinic-customers-service
    container_name: customers-service
    networks: [petclinic-net]
    ports:
      - "8081:8081"
    environment:
      <<: *spring_customers_env
    deploy:
      resources:
        limits:
          memory: 768M
    depends_on:
      discovery-server:
        condition: service_healthy

  visits-service:
    image: springcommunity/spring-petclinic-visits-service
    container_name: visits-service
    networks: [petclinic-net]
    ports:
      - "8082:8082"
    environment:
      <<: *spring_docker_env
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy

  vets-service:
    image: springcommunity/spring-petclinic-vets-service
    container_name: vets-service
    networks: [petclinic-net]
    ports:
      - "8083:8083"
    environment:
      <<: *spring_docker_env
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy

  api-gateway:
    image: springcommunity/spring-petclinic-api-gateway
    container_name: api-gateway
    networks: [petclinic-net]
    ports:
      - "8088:8080"
    environment:
      <<: *spring_docker_env
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy

  admin-server:
    image: springcommunity/spring-petclinic-admin-server
    container_name: admin-server
    networks: [petclinic-net]
    ports:
      - "9092:9090"   # host 9092 (9090 thường bị chiếm bởi Prometheus/process khác)
    environment:
      <<: *spring_docker_env
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy

  tracing-server:
    image: openzipkin/zipkin
    container_name: tracing-server
    networks: [petclinic-net]
    ports:
      - "9411:9411"

  ## ========================
  ## Observability
  ## ========================

  grafana-server:
    build: ./docker/grafana
    container_name: grafana-server
    networks: [petclinic-net]
    ports:
      - "3030:3000"
    volumes:
      # Live-reload dashboards/provisioning when files change (no image rebuild each edit)
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../vet-infra/ansible/grafana/dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      resources:
        limits:
          memory: 512M

  prometheus-server:
    build: ./docker/prometheus
    container_name: prometheus-server
    networks: [petclinic-net]
    ports:
      - "9091:9090"
    deploy:
      resources:
        limits:
          memory: 256M

  ## ========================
  ## MLflow Stack
  ## ========================

  postgres:
    image: postgres:15-alpine
    container_name: postgres-mlflow
    networks: [petclinic-net]
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow
    networks: [petclinic-net]
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: >
      mlflow server 
        --host 0.0.0.0 
        --port 5000 
        --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
        --default-artifact-root /mlflow/artifacts
        --serve-artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mlflow", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5

  ## ========================
  ## Vet AI
  ## ========================

  mlair-redis:
    image: redis:7-alpine
    container_name: mlair-redis
    networks: [petclinic-net]
    restart: unless-stopped

  mlair-postgres:
    image: postgres:16
    container_name: mlair-postgres
    networks: [petclinic-net]
    environment:
      POSTGRES_USER: ${ML_AIR_POSTGRES_USER:-mlair}
      POSTGRES_PASSWORD: ${ML_AIR_POSTGRES_PASSWORD:-mlair}
      POSTGRES_DB: ${ML_AIR_POSTGRES_DB:-mlair}
    volumes:
      - mlair_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ML_AIR_POSTGRES_USER:-mlair}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mlair-api:
    image: ghcr.io/phu142857/ml-air-api:${MLAIR_IMAGE_TAG:-latest}
    container_name: mlair-api
    networks: [petclinic-net]
    ports:
      - "${ML_AIR_API_PORT:-8080}:8080"
    environment:
      ML_AIR_REDIS_URL: ${ML_AIR_REDIS_URL:-redis://mlair-redis:6379/0}
      ML_AIR_DATABASE_URL: ${ML_AIR_DATABASE_URL:-postgresql://mlair:mlair@mlair-postgres:5432/mlair}
      ML_AIR_JWT_HS256_SECRET: ${ML_AIR_JWT_HS256_SECRET:-mlair-dev-jwt-secret-32bytes-minimum-key}
      ML_AIR_TRACKING_TOKEN: ${ML_AIR_TRACKING_TOKEN:-maintainer-token}
      ML_AIR_MANIFEST_SIGNING_KEY: ${ML_AIR_MANIFEST_SIGNING_KEY:-mlair-dev-manifest-signing-key}
      ML_AIR_MANIFEST_ACTIVE_KEY_ID: ${ML_AIR_MANIFEST_ACTIVE_KEY_ID:-v1}
      ML_AIR_MANIFEST_SIGNING_KEYS_JSON: ${ML_AIR_MANIFEST_SIGNING_KEYS_JSON:-{"v1":"mlair-dev-manifest-signing-key"}}
      ML_AIR_MANIFEST_KEY_PROVIDER: ${ML_AIR_MANIFEST_KEY_PROVIDER:-env}
      ML_AIR_MANIFEST_MANAGED_KEYS_FILE: ${ML_AIR_MANIFEST_MANAGED_KEYS_FILE:-}
      ML_AIR_MANIFEST_STRICT_KEY_LIFECYCLE: ${ML_AIR_MANIFEST_STRICT_KEY_LIFECYCLE:-0}
      ML_AIR_MANIFEST_ALLOWED_KEY_IDS: ${ML_AIR_MANIFEST_ALLOWED_KEY_IDS:-}
      ML_AIR_MANIFEST_SIGNING_ALGORITHM: ${ML_AIR_MANIFEST_SIGNING_ALGORITHM:-hmac-sha256}
      ML_AIR_MANIFEST_ED25519_PRIVATE_KEY: ${ML_AIR_MANIFEST_ED25519_PRIVATE_KEY:-}
      ML_AIR_MANIFEST_ED25519_PRIVATE_KEYS_JSON: ${ML_AIR_MANIFEST_ED25519_PRIVATE_KEYS_JSON:-}
      ML_AIR_MANIFEST_ED25519_PUBLIC_KEY: ${ML_AIR_MANIFEST_ED25519_PUBLIC_KEY:-}
      ML_AIR_MANIFEST_ED25519_PUBLIC_KEYS_JSON: ${ML_AIR_MANIFEST_ED25519_PUBLIC_KEYS_JSON:-}
    depends_on:
      mlair-redis:
        condition: service_started
      mlair-postgres:
        condition: service_healthy
    restart: unless-stopped

  mlair-scheduler:
    image: ghcr.io/phu142857/ml-air-scheduler:${MLAIR_IMAGE_TAG:-latest}
    container_name: mlair-scheduler
    networks: [petclinic-net]
    environment:
      ML_AIR_REDIS_URL: ${ML_AIR_REDIS_URL:-redis://mlair-redis:6379/0}
      ML_AIR_DATABASE_URL: ${ML_AIR_DATABASE_URL:-postgresql://mlair:mlair@mlair-postgres:5432/mlair}
      ML_AIR_REPLAY_REQUIRE_ARTIFACT_EVIDENCE: ${ML_AIR_REPLAY_REQUIRE_ARTIFACT_EVIDENCE:-1}
      ML_AIR_REPLAY_REQUIRE_CHECKSUM: ${ML_AIR_REPLAY_REQUIRE_CHECKSUM:-0}
      ML_AIR_REPLAY_REQUIRE_SIGNED_MANIFEST: ${ML_AIR_REPLAY_REQUIRE_SIGNED_MANIFEST:-0}
      ML_AIR_MANIFEST_SIGNING_KEY: ${ML_AIR_MANIFEST_SIGNING_KEY:-mlair-dev-manifest-signing-key}
      ML_AIR_MANIFEST_ACTIVE_KEY_ID: ${ML_AIR_MANIFEST_ACTIVE_KEY_ID:-v1}
      ML_AIR_MANIFEST_SIGNING_KEYS_JSON: ${ML_AIR_MANIFEST_SIGNING_KEYS_JSON:-{"v1":"mlair-dev-manifest-signing-key"}}
      ML_AIR_MANIFEST_KEY_PROVIDER: ${ML_AIR_MANIFEST_KEY_PROVIDER:-env}
      ML_AIR_MANIFEST_MANAGED_KEYS_FILE: ${ML_AIR_MANIFEST_MANAGED_KEYS_FILE:-}
      ML_AIR_MANIFEST_STRICT_KEY_LIFECYCLE: ${ML_AIR_MANIFEST_STRICT_KEY_LIFECYCLE:-0}
      ML_AIR_MANIFEST_ALLOWED_KEY_IDS: ${ML_AIR_MANIFEST_ALLOWED_KEY_IDS:-}
      ML_AIR_MANIFEST_SIGNING_ALGORITHM: ${ML_AIR_MANIFEST_SIGNING_ALGORITHM:-hmac-sha256}
      ML_AIR_MANIFEST_ED25519_PUBLIC_KEY: ${ML_AIR_MANIFEST_ED25519_PUBLIC_KEY:-}
      ML_AIR_MANIFEST_ED25519_PUBLIC_KEYS_JSON: ${ML_AIR_MANIFEST_ED25519_PUBLIC_KEYS_JSON:-}
    depends_on:
      mlair-redis:
        condition: service_started
      mlair-postgres:
        condition: service_healthy
    restart: unless-stopped

  mlair-executor:
    image: ghcr.io/phu142857/ml-air-executor:${MLAIR_IMAGE_TAG:-latest}
    container_name: mlair-executor
    networks: [petclinic-net]
    environment:
      ML_AIR_REDIS_URL: ${ML_AIR_REDIS_URL:-redis://mlair-redis:6379/0}
      ML_AIR_DATABASE_URL: ${ML_AIR_DATABASE_URL:-postgresql://mlair:mlair@mlair-postgres:5432/mlair}
      ML_AIR_API_BASE_URL: http://mlair-api:8080
      ML_AIR_TRACKING_TOKEN: ${ML_AIR_TRACKING_TOKEN:-maintainer-token}
      ML_AIR_MANIFEST_SIGNING_KEY: ${ML_AIR_MANIFEST_SIGNING_KEY:-mlair-dev-manifest-signing-key}
      ML_AIR_MANIFEST_ACTIVE_KEY_ID: ${ML_AIR_MANIFEST_ACTIVE_KEY_ID:-v1}
      ML_AIR_MANIFEST_SIGNING_KEYS_JSON: ${ML_AIR_MANIFEST_SIGNING_KEYS_JSON:-{"v1":"mlair-dev-manifest-signing-key"}}
      ML_AIR_MANIFEST_KEY_PROVIDER: ${ML_AIR_MANIFEST_KEY_PROVIDER:-env}
      ML_AIR_MANIFEST_MANAGED_KEYS_FILE: ${ML_AIR_MANIFEST_MANAGED_KEYS_FILE:-}
      ML_AIR_MANIFEST_STRICT_KEY_LIFECYCLE: ${ML_AIR_MANIFEST_STRICT_KEY_LIFECYCLE:-0}
      ML_AIR_MANIFEST_ALLOWED_KEY_IDS: ${ML_AIR_MANIFEST_ALLOWED_KEY_IDS:-}
      ML_AIR_MANIFEST_SIGNING_ALGORITHM: ${ML_AIR_MANIFEST_SIGNING_ALGORITHM:-hmac-sha256}
      ML_AIR_MANIFEST_ED25519_PRIVATE_KEY: ${ML_AIR_MANIFEST_ED25519_PRIVATE_KEY:-}
      ML_AIR_MANIFEST_ED25519_PRIVATE_KEYS_JSON: ${ML_AIR_MANIFEST_ED25519_PRIVATE_KEYS_JSON:-}
    depends_on:
      mlair-api:
        condition: service_started
      mlair-redis:
        condition: service_started
      mlair-postgres:
        condition: service_healthy
    restart: unless-stopped

  mlair-frontend:
    image: ghcr.io/phu142857/ml-air-frontend:${MLAIR_IMAGE_TAG:-latest}
    container_name: mlair-frontend
    networks: [petclinic-net]
    ports:
      - "${ML_AIR_FRONTEND_PORT:-38080}:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18080}
    depends_on:
      mlair-api:
        condition: service_started

  vet-ai:
    build:
      context: ../vet-ai
      dockerfile: docker/Dockerfile.api
    container_name: vet-ai
    user: "${VETAI_UID:-1000}:${VETAI_GID:-1000}"
    networks: [petclinic-net]
    ports:
      - "8000:8000"
    env_file:
      - path: ../vet-infra/.env
        required: false
      - path: ./.env.local
        required: false
    volumes:
      - ../vet-ai/ai_service/models:/app/ai_service/models
      - ../vet-ml/data/vet-ai-project/veterinary_full_data_10000.csv:/app/baseline/veterinary_full_data_10000.csv:ro
    environment:
      # Prefer values from env_file; keep sane defaults for local
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      # Local test: reuse postgres-mlflow for continuous-training persistence.
      # For production, prefer separate DB/schema and credential.
      DATABASE_URL: ${DATABASE_URL:-postgresql://mlflow:mlflow@postgres:5432/mlflow}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-secret}
      MODEL_DIR: ${MODEL_DIR:-/app/ai_service/models/v2}
      MODEL_ROOT_DIR: ${MODEL_ROOT_DIR:-/app/ai_service/models}
      FINETUNE_PREVIOUS_MODEL: ${FINETUNE_PREVIOUS_MODEL:-true}
      FINETUNE_ADD_TREES: ${FINETUNE_ADD_TREES:-20}
      # MLOps clinic dropdown: GET {CUSTOMERS_SERVICE_BASE_URL}{CUSTOMERS_CLINICS_PATH}
      CUSTOMERS_SERVICE_BASE_URL: ${CUSTOMERS_SERVICE_BASE_URL:-http://customers-service:8081}
      CUSTOMERS_CLINICS_CACHE_TTL_SECONDS: ${CUSTOMERS_CLINICS_CACHE_TTL_SECONDS:-60}
    depends_on:
      mlflow:
        condition: service_healthy
      customers-service:
        condition: service_started
      mlair-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  genai-service:
    build: ./spring-petclinic-genai-service
    container_name: genai-service
    networks: [petclinic-net]
    ports:
      - "8090:8084"
    env_file:
      - path: ../vet-infra/.env
        required: false
      - path: ./.env.local
        required: false
    environment:
      <<: *spring_docker_env
      VETAI_DIAGNOSIS_URL: http://vet-ai:8000
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-secret}
    deploy:
      resources:
        limits:
          memory: 768M
    depends_on:
      vet-ai:
        condition: service_healthy

  vet-ai-training:
    build:
      context: ../vet-ai
      dockerfile: docker/Dockerfile.training
    container_name: vet-ai-training
    user: "${VETAI_UID:-1000}:${VETAI_GID:-1000}"
    networks: [petclinic-net]
    env_file:
      - path: ../vet-infra/.env
        required: false
      - path: ./.env.local
        required: false
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-secret}
      DATA_SOURCE: api
      API_BASE_URL: http://vet-ai:8000
    volumes:
      - ../vet-ai:/app
      - training_data:/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    depends_on:
      vet-ai:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    profiles:
      - training

volumes:
  postgres_data:
  mlflow_artifacts:
  training_data:
  mlair_postgres_data: