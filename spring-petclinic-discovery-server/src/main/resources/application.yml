spring:
  application:
    name: discovery-server
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888/}

# Avoid some debugging logs at startup
logging:
  level:
    org:
      springframework:
        boot: INFO
        web: INFO

---
spring:
  config:
    activate:
      # Phải khớp SPRING_PROFILES_ACTIVE=deploy (compose/EKS) hoặc docker (cũ)
      on-profile: "docker | deploy"
    import: configserver:http://config-server:8888

