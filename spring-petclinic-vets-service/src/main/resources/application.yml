spring:
  application:
    name: vets-service
  security:
    oauth2:
      resourceserver:
        jwt:
          # Same HS256 secret as customers-service / gateway (compose: JWT_SECRET)
          secret-key: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888/}
  cache:
    cache-names: vets
  profiles:
    active: production

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [req:%X{requestId}]"

---
spring:
  config:
    activate:
      on-profile: "docker | deploy"
    import: configserver:http://config-server:8888
