# K8s: cluster DNS + static upstreams (no Podman/Docker resolver needed).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location = /mlair-runtime-config.js {
        default_type application/javascript;
        alias /etc/nginx/mlair/mlair-runtime-config.js;
        add_header Cache-Control "no-cache";
    }

    location ^~ /health {
        proxy_pass http://mlair-api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
    }

    location ^~ /docs {
        proxy_pass http://mlair-api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
    }

    location ^~ /v1/ {
        client_max_body_size 0;
        proxy_pass http://mlair-api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location = /favicon.ico {
        proxy_pass http://mlair-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
    }

    location / {
        client_max_body_size 512m;
        proxy_pass http://mlair-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
