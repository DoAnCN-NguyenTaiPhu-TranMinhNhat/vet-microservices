<h2 class="section-title mb-2">Pet</h2>

<div class="card shadow-soft p-3">
<form ng-submit="$ctrl.submit()">
    <div class="row g-3">
        <div class="col-md-6">
            <div class="text-muted small">Owner</div>
            <div class="value-lg">{{$ctrl.pet.owner}}</div>
        </div>

        <div class="col-md-6">
            <label>Name</label>
            <input class="form-control" ng-model="$ctrl.pet.name" name="name" required type="text"/>
            <span ng-show="petForm.name.$error.required" class="help-inline">Name is required.</span>
        </div>

        <div class="col-md-6">
            <label>Birth date</label>
            <input class="form-control" ng-model="$ctrl.pet.birthDate" required type="date"/>
        </div>

        <div class="col-md-6">
            <label>Type</label>
            <select class="form-control" ng-model="$ctrl.petTypeId">
                <option ng-repeat="t in $ctrl.types track by t.id" value="{{t.id}}">{{t.name}}</option>
            </select>
        </div>

        <div class="col-md-6">
            <label>Gender</label>
            <select class="form-control" ng-model="$ctrl.pet.gender">
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="col-md-6">
            <label>Vaccination Status</label>
            <select class="form-control" ng-model="$ctrl.pet.vaccinationStatus">
                <option value="">Select Status</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
                <option value="unknown">Unknown</option>
            </select>
        </div>

        <div class="col-12">
            <label>Medical Notes</label>
            <textarea class="form-control" ng-model="$ctrl.pet.medicalNotes" rows="3"
                      placeholder="e.g. Allergies, chronic conditions, medications..."></textarea>
        </div>
    </div>

    <div class="actions-row mt-3">
        <button class="btn btn-primary" type="submit">Submit</button>
    </div>
</form>
</div>
