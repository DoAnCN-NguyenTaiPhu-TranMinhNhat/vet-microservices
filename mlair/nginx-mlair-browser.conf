# Single browser origin: UI + /v1 API on the same host:port (see mlair-browser-gateway).
# Fixes "NetworkError" on dataset upload when only the UI port is reachable or cross-port requests fail.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # ^~ stops regex locations (if any) from stealing /v1 before the API upstream.
    # client_max_body_size 0 disables the default 1m limit (otherwise nginx returns HTML 413 and
    # the UI fails with JSON.parse on res.json()).
    location ^~ /v1/ {
        client_max_body_size 0;
        proxy_pass http://mlair-api:8080/v1/;
        proxy_http_version 1.1;
        # Preserve host:port so upstream logging and any URL logic match the browser.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        # Default proxy_request_buffering on is more reliable for large multipart → uvicorn.
    }

    location / {
        client_max_body_size 512m;
        proxy_pass http://mlair-frontend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
