# Shared stack: same profile as EKS (Ansible) — vet-microservices-config on-profile: deploy
x-spring-docker-env: &spring_docker_env
  SPRING_PROFILES_ACTIVE: deploy
  # All Spring containers must talk to config-server via service DNS (not localhost).
  # Without this, services fall back to http://localhost:8888 inside the container and boot with wrong defaults.
  CONFIG_SERVER_URL: http://config-server:8888/
  # Empty JWT_SECRET in a host .env breaks JwtTokenService (needs ≥32 bytes) → container exits 1.
  JWT_SECRET: ${JWT_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=72.0

# Compose has no MySQL for core services: customers-service needs explicit JDBC + sql init.
x-spring-customers-env: &spring_customers_env
  SPRING_PROFILES_ACTIVE: deploy
  CONFIG_SERVER_URL: http://config-server:8888/
  JWT_SECRET: ${JWT_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=72.0
  SPRING_DATASOURCE_URL: jdbc:hsqldb:mem:petclinic;DB_CLOSE_DELAY=-1
  SPRING_DATASOURCE_USERNAME: sa
  SPRING_DATASOURCE_PASSWORD: ""
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.hsqldb.jdbc.JDBCDriver
  SPRING_SQL_INIT_MODE: always

networks:
  petclinic-net:
    driver: bridge

services:

  ## ========================
  ## Spring Cloud Core
  ## ========================

  config-server:
    image: springcommunity/spring-petclinic-config-server
    container_name: config-server
    networks: [petclinic-net]
    ports:
      - "8888:8888"
    environment:
      <<: *spring_docker_env
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  discovery-server:
    image: springcommunity/spring-petclinic-discovery-server
    container_name: discovery-server
    networks: [petclinic-net]
    ports:
      - "8761:8761"
    environment:
      <<: *spring_docker_env
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  customers-service:
    image: springcommunity/spring-petclinic-customers-service
    container_name: customers-service
    networks: [petclinic-net]
    ports:
      - "8081:8081"
    environment:
      <<: *spring_customers_env
    deploy:
      resources:
        limits:
          memory: 768M
    depends_on:
      discovery-server:
        condition: service_healthy

  visits-service:
    image: springcommunity/spring-petclinic-visits-service
    container_name: visits-service
    networks: [petclinic-net]
    ports:
      - "8082:8082"
    environment:
      <<: *spring_docker_env
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy

  vets-service:
    image: springcommunity/spring-petclinic-vets-service
    container_name: vets-service
    networks: [petclinic-net]
    ports:
      - "8083:8083"
    environment:
      <<: *spring_docker_env
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy

  # Build from repo so Angular/static UI changes (e.g. visit model picker) ship with the image.
  # From repo root: mvn -pl spring-petclinic-api-gateway -am package -DskipTests && docker compose build api-gateway
  # Use localhost/ name so `compose pull` / Podman never queries Docker Hub for a non-existent :local manifest.
  api-gateway:
    build: ./spring-petclinic-api-gateway
    image: localhost/vet-petclinic-api-gateway:local
    pull_policy: build
    container_name: api-gateway
    networks: [petclinic-net]
    ports:
      - "8088:8080"
    environment:
      <<: *spring_docker_env
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy

  admin-server:
    image: springcommunity/spring-petclinic-admin-server
    container_name: admin-server
    networks: [petclinic-net]
    ports:
      - "9092:9090"   # host 9092 (9090 thường bị chiếm bởi Prometheus/process khác)
    environment:
      <<: *spring_docker_env
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy

  tracing-server:
    image: openzipkin/zipkin
    container_name: tracing-server
    networks: [petclinic-net]
    ports:
      - "9411:9411"

  ## ========================
  ## Observability
  ## ========================

  grafana-server:
    build: ./docker/grafana
    container_name: grafana-server
    networks: [petclinic-net]
    ports:
      - "3030:3000"
    volumes:
      # Live-reload dashboards/provisioning when files change (no image rebuild each edit)
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../vet-infra/ansible/grafana/dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      resources:
        limits:
          memory: 512M

  prometheus-server:
    build: ./docker/prometheus
    container_name: prometheus-server
    networks: [petclinic-net]
    ports:
      - "9091:9090"
    deploy:
      resources:
        limits:
          memory: 256M

  ## ========================
  ## MLflow Stack
  ## ========================

  postgres:
    image: postgres:15-alpine
    container_name: postgres-mlflow
    networks: [petclinic-net]
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow
    networks: [petclinic-net]
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: >
      mlflow server 
        --host 0.0.0.0 
        --port 5000 
        --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
        --default-artifact-root /mlflow/artifacts
        --serve-artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mlflow", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5

  ## ========================
  ## Vet AI
  ## ========================

  vet-ai:
    build:
      context: ../vet-ai
      dockerfile: docker/Dockerfile.api
    container_name: vet-ai
    user: "${VETAI_UID:-1000}:${VETAI_GID:-1000}"
    networks: [petclinic-net]
    ports:
      - "8000:8000"
    env_file:
      - path: ../vet-infra/.env
        required: false
      - path: ./.env
        required: false
    volumes:
      - ../vet-ai/ai_service/models:/app/ai_service/models
      - ../vet-ml/data/vet-ai-project/veterinary_full_data_10000.csv:/app/baseline/veterinary_full_data_10000.csv:ro
    environment:
      # Prefer values from env_file; keep sane defaults for local
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      # MLAir (optional): set MLAIR_API_BASE_URL in ./.env when mlair-api is on petclinic-net
      MLAIR_API_BASE_URL: ${MLAIR_API_BASE_URL:-}
      MLAIR_API_TOKEN: ${MLAIR_API_TOKEN:-admin-token}
      MLAIR_TENANT_ID: ${MLAIR_TENANT_ID:-default}
      MLAIR_PROJECT_GLOBAL: ${MLAIR_PROJECT_GLOBAL:-default_project}
      MLAIR_PROJECT_CLINIC_PREFIX: ${MLAIR_PROJECT_CLINIC_PREFIX:-clinic_}
      MLAIR_IMPORT_STAGE: ${MLAIR_IMPORT_STAGE:-staging}
      MLAIR_TIMEOUT_SECONDS: ${MLAIR_TIMEOUT_SECONDS:-120}
      # Shared secret: mlair-api MLAIR_MODEL_PROMOTE_WEBHOOK_BEARER_TOKEN must match when calling this URL.
      MLAIR_PROMOTE_WEBHOOK_INBOUND_TOKEN: ${MLAIR_PROMOTE_WEBHOOK_INBOUND_TOKEN:-}
      # Local test: reuse postgres-mlflow for continuous-training persistence.
      # For production, prefer separate DB/schema and credential.
      DATABASE_URL: ${DATABASE_URL:-postgresql://mlflow:mlflow@postgres:5432/mlflow}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-secret}
      MODEL_DIR: ${MODEL_DIR:-/app/ai_service/models/v2}
      MODEL_ROOT_DIR: ${MODEL_ROOT_DIR:-/app/ai_service/models}
      FINETUNE_PREVIOUS_MODEL: ${FINETUNE_PREVIOUS_MODEL:-true}
      FINETUNE_ADD_TREES: ${FINETUNE_ADD_TREES:-20}
      # MLOps clinic dropdown: GET {CUSTOMERS_SERVICE_BASE_URL}{CUSTOMERS_CLINICS_PATH}
      CUSTOMERS_SERVICE_BASE_URL: ${CUSTOMERS_SERVICE_BASE_URL:-http://customers-service:8081}
      CUSTOMERS_CLINICS_CACHE_TTL_SECONDS: ${CUSTOMERS_CLINICS_CACHE_TTL_SECONDS:-60}
    depends_on:
      mlflow:
        condition: service_healthy
      customers-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  genai-service:
    build: ./spring-petclinic-genai-service
    container_name: genai-service
    networks: [petclinic-net]
    ports:
      - "8090:8084"
    env_file:
      - path: ../vet-infra/.env
        required: false
      - path: ./.env
        required: false
    environment:
      <<: *spring_docker_env
      VETAI_DIAGNOSIS_URL: http://vet-ai:8000
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-secret}
    deploy:
      resources:
        limits:
          memory: 768M
    depends_on:
      vet-ai:
        condition: service_healthy

  vet-ai-training:
    build:
      context: ../vet-ai
      dockerfile: docker/Dockerfile.training
    container_name: vet-ai-training
    user: "${VETAI_UID:-1000}:${VETAI_GID:-1000}"
    networks: [petclinic-net]
    env_file:
      - path: ../vet-infra/.env
        required: false
      - path: ./.env
        required: false
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLAIR_API_BASE_URL: ${MLAIR_API_BASE_URL:-}
      MLAIR_API_TOKEN: ${MLAIR_API_TOKEN:-admin-token}
      MLAIR_TENANT_ID: ${MLAIR_TENANT_ID:-default}
      MLAIR_PROJECT_GLOBAL: ${MLAIR_PROJECT_GLOBAL:-default_project}
      MLAIR_PROJECT_CLINIC_PREFIX: ${MLAIR_PROJECT_CLINIC_PREFIX:-clinic_}
      MLAIR_IMPORT_STAGE: ${MLAIR_IMPORT_STAGE:-staging}
      MLAIR_TIMEOUT_SECONDS: ${MLAIR_TIMEOUT_SECONDS:-120}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-secret}
      DATA_SOURCE: api
      API_BASE_URL: http://vet-ai:8000
    volumes:
      - ../vet-ai:/app
      - training_data:/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    depends_on:
      vet-ai:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    profiles:
      - training

  ## ========================
  ## MLAir control plane (Compose profile: mlair — services không chạy nếu không bật profile)
  ## Bật mặc định: đặt COMPOSE_PROFILES=mlair trong `.env` (đã có trong template) rồi `docker compose up -d`
  ## Hoặc: docker compose --profile mlair up -d
  ## Images GHCR: https://github.com/phu142857/ml-air/pkgs/container/
  ## Vet-AI: MLAIR_API_BASE_URL=http://mlair-api:8080 (see .env.example)
  ## Pin: MLAIR_IMAGE_TAG=v0.4.0 (example). Browser uses mlair-browser-gateway: same host:port as UI,
  ## ./mlair/mlair-runtime-config.js sets api_base_url to window.location.origin (see .env.example).
  ## Dataset upload: mlair-api startup (above) reapplies DB default for materialized_from_buffer after alembic.
  ## Optional manual: ./mlair/sql/fix_dataset_versions_materialized_default.sql
  ## ========================

  mlair-redis:
    profiles: ["mlair"]
    image: redis:7-alpine
    container_name: mlair-redis
    networks: [petclinic-net]
    ports:
      - "${MLAIR_REDIS_HOST_PORT:-16379}:6379"
    restart: unless-stopped

  mlair-postgres:
    profiles: ["mlair"]
    image: postgres:16-alpine
    container_name: mlair-postgres
    networks: [petclinic-net]
    environment:
      POSTGRES_USER: ${MLAIR_POSTGRES_USER:-mlair}
      POSTGRES_PASSWORD: ${MLAIR_POSTGRES_PASSWORD:-mlair}
      POSTGRES_DB: ${MLAIR_POSTGRES_DB:-mlair}
    ports:
      - "${MLAIR_POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - mlair_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlair -d mlair"]
      interval: 5s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  mlair-api:
    profiles: ["mlair"]
    image: ghcr.io/${MLAIR_IMAGE_OWNER:-phu142857}/ml-air-api:${MLAIR_IMAGE_TAG:-latest}
    pull_policy: ${MLAIR_PULL_POLICY:-always}
    container_name: mlair-api
    networks: [petclinic-net]
    environment:
      ML_AIR_REDIS_URL: redis://mlair-redis:6379/0
      ML_AIR_DATABASE_URL: postgresql://${MLAIR_POSTGRES_USER:-mlair}:${MLAIR_POSTGRES_PASSWORD:-mlair}@mlair-postgres:5432/${MLAIR_POSTGRES_DB:-mlair}
      ML_AIR_JWT_HS256_SECRET: ${ML_AIR_JWT_HS256_SECRET:-mlair-dev-jwt-secret-32bytes-minimum-key}
      ML_AIR_TRACKING_TOKEN: ${ML_AIR_TRACKING_TOKEN:-admin-token}
      ML_AIR_SKIP_APPROVAL_FOR_PROMOTE: ${ML_AIR_SKIP_APPROVAL_FOR_PROMOTE:-1}
      ML_AIR_MANIFEST_SIGNING_KEY: ${ML_AIR_MANIFEST_SIGNING_KEY:-mlair-dev-manifest-signing-key}
      ML_AIR_MANIFEST_ACTIVE_KEY_ID: ${ML_AIR_MANIFEST_ACTIVE_KEY_ID:-v1}
      ML_AIR_TASK_EXECUTION_MODE: ${ML_AIR_TASK_EXECUTION_MODE:-internal}
      ML_AIR_DATASET_ARTIFACT_ROOT: ${ML_AIR_DATASET_ARTIFACT_ROOT:-file:///mlair/artifacts/datasets}
      # Same pattern as ml-air/.env.example: model imports + version dirs live here; must be a mounted volume.
      ML_AIR_DEFAULT_MODEL_ARTIFACT_ROOT: ${ML_AIR_DEFAULT_MODEL_ARTIFACT_ROOT:-file:///mlair/artifacts/models}
      # GHCR publish does not include realtime; disable fan-out unless you add a custom realtime image.
      MLAIR_REALTIME_ENABLED: ${MLAIR_REALTIME_ENABLED:-false}
      MLAIR_MODEL_PROMOTE_WEBHOOK_URL: ${MLAIR_MODEL_PROMOTE_WEBHOOK_URL:-}
      MLAIR_MODEL_PROMOTE_WEBHOOK_BEARER_TOKEN: ${MLAIR_MODEL_PROMOTE_WEBHOOK_BEARER_TOKEN:-}
    ports:
      - "${MLAIR_API_HOST_PORT:-18080}:8080"
    volumes:
      - mlair_dataset_artifacts:/mlair/artifacts/datasets
      - mlair_model_artifacts:/mlair/artifacts/models
    depends_on:
      mlair-redis:
        condition: service_started
      mlair-postgres:
        condition: service_healthy
    # Alembic defaults to alembic_version.version_num VARCHAR(32); long revision ids (e.g. 0015_dataset_accumulation_buffer) exceed it → api exits 1.
    # Pre-create / widen before `alembic upgrade head` (image already has psycopg).
    # After migrations: ml-air 0018 leaves dataset_versions.materialized_from_buffer NOT NULL without a DB
    # default while inserts omit it → 500 text/plain on CSV upload. Re-apply default on every start (idempotent).
    command:
      - sh
      - -c
      - |
        set -e
        python -c "
        import os
        import psycopg
        url = os.environ['ML_AIR_DATABASE_URL']
        with psycopg.connect(url) as conn:
            conn.autocommit = True
            with conn.cursor() as cur:
                cur.execute(
                    'CREATE TABLE IF NOT EXISTS alembic_version (version_num VARCHAR(255) NOT NULL)'
                )
                cur.execute(
                    'ALTER TABLE alembic_version ALTER COLUMN version_num TYPE VARCHAR(255)'
                )
        "
        alembic upgrade head
        python -c "
        import os
        import psycopg
        url = os.environ['ML_AIR_DATABASE_URL']
        with psycopg.connect(url) as conn:
            conn.autocommit = True
            with conn.cursor() as cur:
                cur.execute(
                    'SELECT 1 FROM information_schema.columns WHERE table_schema = %s AND table_name = %s AND column_name = %s',
                    ('public', 'dataset_versions', 'materialized_from_buffer'),
                )
                if cur.fetchone() is None:
                    raise SystemExit(0)
                cur.execute(
                    'ALTER TABLE dataset_versions ALTER COLUMN materialized_from_buffer SET DEFAULT false'
                )
                cur.execute(
                    'UPDATE dataset_versions SET materialized_from_buffer = false WHERE materialized_from_buffer IS NULL'
                )
        "
        exec uvicorn main:app --host 0.0.0.0 --port 8080
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/docs', timeout=2).read(1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  mlair-scheduler:
    profiles: ["mlair"]
    image: ghcr.io/${MLAIR_IMAGE_OWNER:-phu142857}/ml-air-scheduler:${MLAIR_IMAGE_TAG:-latest}
    pull_policy: ${MLAIR_PULL_POLICY:-always}
    container_name: mlair-scheduler
    networks: [petclinic-net]
    environment:
      ML_AIR_REDIS_URL: redis://mlair-redis:6379/0
      ML_AIR_DATABASE_URL: postgresql://${MLAIR_POSTGRES_USER:-mlair}:${MLAIR_POSTGRES_PASSWORD:-mlair}@mlair-postgres:5432/${MLAIR_POSTGRES_DB:-mlair}
      ML_AIR_TASK_EXECUTION_MODE: ${ML_AIR_TASK_EXECUTION_MODE:-internal}
      ML_AIR_MANIFEST_SIGNING_KEY: ${ML_AIR_MANIFEST_SIGNING_KEY:-mlair-dev-manifest-signing-key}
      ML_AIR_MANIFEST_ACTIVE_KEY_ID: ${ML_AIR_MANIFEST_ACTIVE_KEY_ID:-v1}
      MLAIR_REALTIME_ENABLED: ${MLAIR_REALTIME_ENABLED:-false}
    depends_on:
      mlair-redis:
        condition: service_started
      mlair-postgres:
        condition: service_healthy
    restart: unless-stopped

  mlair-executor:
    profiles: ["mlair"]
    image: ghcr.io/${MLAIR_IMAGE_OWNER:-phu142857}/ml-air-executor:${MLAIR_IMAGE_TAG:-latest}
    pull_policy: ${MLAIR_PULL_POLICY:-always}
    container_name: mlair-executor
    networks: [petclinic-net]
    environment:
      ML_AIR_REDIS_URL: redis://mlair-redis:6379/0
      ML_AIR_DATABASE_URL: postgresql://${MLAIR_POSTGRES_USER:-mlair}:${MLAIR_POSTGRES_PASSWORD:-mlair}@mlair-postgres:5432/${MLAIR_POSTGRES_DB:-mlair}
      ML_AIR_API_BASE_URL: http://mlair-api:8080
      ML_AIR_TRACKING_TOKEN: ${ML_AIR_TRACKING_TOKEN:-admin-token}
      ML_AIR_MANIFEST_SIGNING_KEY: ${ML_AIR_MANIFEST_SIGNING_KEY:-mlair-dev-manifest-signing-key}
      ML_AIR_MANIFEST_ACTIVE_KEY_ID: ${ML_AIR_MANIFEST_ACTIVE_KEY_ID:-v1}
    depends_on:
      mlair-redis:
        condition: service_started
      mlair-postgres:
        condition: service_healthy
      mlair-api:
        condition: service_healthy
    restart: unless-stopped

  mlair-frontend:
    profiles: ["mlair"]
    image: ghcr.io/${MLAIR_IMAGE_OWNER:-phu142857}/ml-air-frontend:${MLAIR_IMAGE_TAG:-latest}
    pull_policy: ${MLAIR_PULL_POLICY:-always}
    container_name: mlair-frontend
    networks: [petclinic-net]
    volumes:
      # Runtime API base = window.location.origin; nginx (mlair-browser-gateway) proxies /v1 → mlair-api.
      - ./mlair/mlair-runtime-config.js:/app/public/mlair-runtime-config.js:ro
    depends_on:
      mlair-api:
        condition: service_started
    restart: unless-stopped

  mlair-browser-gateway:
    profiles: ["mlair"]
    image: nginx:1.27-alpine
    container_name: mlair-browser-gateway
    networks: [petclinic-net]
    ports:
      - "${MLAIR_FRONTEND_HOST_PORT:-38080}:8080"
    volumes:
      - ./mlair/nginx-mlair-browser.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      mlair-api:
        condition: service_healthy
      mlair-frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  mlflow_artifacts:
  training_data:
  mlair_pgdata:
  mlair_dataset_artifacts:
  mlair_model_artifacts: